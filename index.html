<style>
  :root{
    --bg:#0f1f1a; --card:#16302a; --accent:#d4a93a; --accent2:#7fb685;

  body{
    margin:0; font-family:'Georgia',serif; background:

  h1{
    text-align:center; font-size:1.6em; letter-spacing:2px; margin:0 0 4px;

    background:var(--card); border:1px solid var(--line); border-radius:14px;

    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:#0e211c; color:var(--text); font-size:1em; font-family:inherit;
  }
  .btn{
    border:none; border-radius:10px; padding:12px 16px; font-size:1em;
    cursor:pointer; font-family:inherit; font-weight:bold; transition:transform .08s;

  .btn:active{ transform:scale(0.96); }
  .btn-main{ background:var(--accent); color:#1a1208; width:100%; margin-top:14px;}

  .player-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;

  }

    content:"LEAD"; position:absolute; top:10px; right:-30px; background:var(--accent);
    color:#1a1208; padding:3px 34px; font-size:0.65em; transform:rotate(35deg);
    font-weight:bold; letter-spacing:1px;

  .pname{ font-size:1.1em; font-weight:bold; color:var(--accent2); }
  .pscore{ font-size:2.4em; font-weight:bold; margin:4px 0; color:var(--text); }
  .pmeta{ font-size:0.75em; color:var(--muted); margin-bottom:8px; }
  .lastadd{ color:var(--accent); font-weight:bold; }

    height:8px; border-radius:4px; background:#0e211c; overflow:hidden; margin-bottom:10px;

    position:absolute; top:-9px; font-size:0.6em; color:var(--danger); transform:translateX(-50%);
  }

  table{ width:100%; border-collapse:collapse; font-size:0.9em; }
  th,td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }

  .navbar{ display:flex; gap:10px; max-width:520px; margin:0 auto 16px; }
  .navbar .btn{ flex:1; padding:10px; font-size:0.85em; }
  .navbar .btn.active-tab{ background:var(--accent); color:#1a1208; border-color:var(--accent); }
  .hidden{ display:none; }
  .empty{ color:var(--muted); text-align:center; padding:20px 0; font-size:0.9em; }

  .game-summary .date{ color:var(--muted); font-size:0.7em; }
  .game-summary .caret{ color:var(--muted); font-size:0.8em; transition:transform .15s; }
  .game-summary .caret.open{ transform:rotate(180deg); }

  .game-detail.open{ display:block; }
  .game-detail .grow{ display:flex; justify-content:space-between; padding:3px 0; }
  .game-detail .grow b{ color:var(--text); }
  .game-detail .skunktxt{ color:var(--danger); font-weight:bold; }
  .reset-btn{ background:var(--danger); color:#fff; }
</style>

<body>

<h1>♣ Cribbage Score Tracker ♦</h1>
<div class="sub">Free crib scoring app for 2 or 3 players — count points, catch the skunk line, and track wins on the leaderboard</div>

<div class="navbar" id="navbar"></div>

<div class="screen" id="app"></div>

<script>
const STORE_DATA = 'crib-data';
const SKUNK = 91, DBL_SKUNK = 61, WIN = 121;

let state = {
  view: 'setup',       // setup | game | leaderboard
  numPlayers: 2,
  names: ['',''],
  players: null,        // [{name, score, history(events)}]
  pending: 0,
  pendingSign: 1,
  finished: false,
  toast: null
};

let leaderboard = {}; // {name: {wins, points, games}}
let history = [];     // completed games

// ---------- storage helpers ----------
// This environment's storage bridge has proven unreliable (failed gets/sets
// even on retry, and threw uncaught errors that crashed the page). To keep
// the app stable, persistence is disabled and everything lives in memory
// for the current session only. Leaderboard/history still work normally
// while you're playing — they just won't survive a full page reload.
async function loadData(){ /* no-op: persistence disabled */ }
async function saveData(){ /* no-op: persistence disabled */ return true; }

// ---------- render ----------
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }

function renderNav(){
  const nav = document.getElementById('navbar');
  nav.innerHTML = '';
  const setupBtn = el(`<button class="btn btn-ghost">🂡 New Game Setup</button>`);
  setupBtn.onclick = ()=>{ state.view='setup'; render(); };
  if(state.view === 'setup') setupBtn.classList.add('active-tab');
  nav.appendChild(setupBtn);

  if(state.players){
    const gameBtn = el(`<button class="btn btn-ghost">🃏 Current Game</button>`);
    if(state.view === 'game') gameBtn.classList.add('active-tab');
    gameBtn.onclick = ()=>{ state.view='game'; render(); };
    nav.appendChild(gameBtn);
  }

  const boardBtn = el(`<button class="btn btn-ghost">🏆 Leaderboard</button>`);
  if(state.view === 'leaderboard') boardBtn.classList.add('active-tab');
  boardBtn.onclick = ()=>{ state.view='leaderboard'; render(); };
  nav.appendChild(boardBtn);
}

function render(){
  try{
    renderNav();
    const app = document.getElementById('app');
    app.innerHTML = '';
    if(state.toast){
      const t = el(`<div class="toast">${state.toast}</div>`);
      app.appendChild(t);
      setTimeout(()=>{ state.toast=null; if(t.parentNode) t.remove(); }, 2600);
    }
    if(state.view === 'setup') renderSetup(app);
    else if(state.view === 'game') renderGame(app);
    else if(state.view === 'leaderboard') renderLeaderboard(app);
  }catch(err){
    console.error('Render failed:', err);
    const app = document.getElementById('app');
    if(app){
      const msg = el(`<div class="card" style="border-color:var(--danger);">
        <div style="color:var(--danger);font-weight:bold;margin-bottom:8px;">Something went wrong rendering this screen.</div>
        <div style="color:var(--muted);font-size:0.85em;margin-bottom:14px;">${escapeHtml((err && err.message) || String(err))}</div>
      </div>`);
      const retryBtn = el(`<button class="btn btn-main">Back to Setup</button>`);
      retryBtn.onclick = ()=>{ state.view='setup'; render(); };
      msg.appendChild(retryBtn);
      app.appendChild(msg);
    }
  }
}

window.addEventListener('error', (e)=>{
  console.error('Uncaught error:', e.error || e.message, e.filename, e.lineno, e.colno);
});

// ---------- SETUP ----------
function renderSetup(app){
  const card = el(`<div class="card">
    <label>Number of players</label>
    <div class="playercount">
      <div class="pc-opt" id="pc2">2 Players</div>
      <div class="pc-opt" id="pc3">3 Players</div>
    </div>
    <div id="nameFields"></div>
    <button class="btn btn-main" id="startBtn">Start Game</button>
  </div>`);
  app.appendChild(card);

  const pc2 = card.querySelector('#pc2'), pc3 = card.querySelector('#pc3');
  function syncNames(n){
    state.numPlayers = n;
    while(state.names.length < n) state.names.push('');
    state.names = state.names.slice(0,n);
    pc2.classList.toggle('sel', n===2);
    pc3.classList.toggle('sel', n===3);
    renderNameFields();
  }
  function renderNameFields(){
    const wrap = card.querySelector('#nameFields');
    wrap.innerHTML = '';
    for(let i=0;i<state.numPlayers;i++){
      const field = el(`<div>
        <label>Player ${i+1} name</label>
        <input type="text" placeholder="Player ${i+1}" value="${escapeHtml(state.names[i]||'')}" />
      </div>`);
      const input = field.querySelector('input');
      input.oninput = (e)=>{ state.names[i] = e.target.value; };
      wrap.appendChild(field);
    }
  }
  pc2.onclick = ()=>syncNames(2);
  pc3.onclick = ()=>syncNames(3);
  syncNames(state.numPlayers);

  card.querySelector('#startBtn').onclick = ()=>{
    const names = state.names.map((n,i)=> (n && n.trim()) ? n.trim() : `Player ${i+1}`);
    // ensure uniqueness for leaderboard sanity
    const seen = {};
    const finalNames = names.map(n=>{
      if(seen[n]==null){ seen[n]=0; return n; }
      seen[n]++; return `${n} (${seen[n]+1})`;
    });
    state.players = finalNames.map(n=>({ name:n, score:0 }));
    state.pending = 0;
    state.pendingSign = 1;
    state.finished = false;
    state.activeIdx = 0;
    state.view = 'game';
    render();
  };
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---------- GAME ----------
function renderGame(app){
  if(!state.players){ state.view='setup'; render(); return; }

  if(state.finished){
    const winner = state.players.reduce((a,b)=> a.score>=b.score?a:b);
    const others = state.players.filter(p=>p!==winner);
    const skunkLines = others.map(p=>{
      if(p.score < DBL_SKUNK) return `${p.name} got double skunked! 🦨🦨`;
      if(p.score < SKUNK) return `${p.name} got skunked! 🦨`;
      return null;
    }).filter(Boolean);

    const banner = el(`<div class="winbanner">
      <h2>${escapeHtml(winner.name)} wins!</h2>
      <div style="color:var(--muted)">Final score: ${winner.score} — ${others.map(p=>escapeHtml(p.name)+': '+p.score).join(' · ')}</div>
      ${skunkLines.map(s=>`<div class="skunktag">${escapeHtml(s)}</div>`).join('')}
      <button class="btn btn-main" id="rematchBtn">Rematch (same players)</button>
      <button class="btn btn-ghost" id="newSetupBtn" style="margin-top:10px;width:100%;">New Game Setup</button>
    </div>`);
    app.appendChild(banner);
    banner.querySelector('#rematchBtn').onclick = ()=>{
      state.players = state.players.map(p=>({name:p.name, score:0, _lastAdd:null}));
      state.finished = false;
      state.pending = 0; state.pendingSign = 1;
      render();
    };
    banner.querySelector('#newSetupBtn').onclick = ()=>{ state.view='setup'; render(); };
    return;
  }

  const maxScore = Math.max(...state.players.map(p=>p.score));

  state.players.forEach((p, idx)=>{
    const isLeader = p.score === maxScore && maxScore > 0;
    const pct = Math.min(100, (p.score/WIN)*100);
    const skunkPct = (SKUNK/WIN)*100, dblPct = (DBL_SKUNK/WIN)*100;

    const card = el(`<div class="player-card ${isLeader?'leader':''}">
      <div class="pname">${escapeHtml(p.name)}</div>
      <div class="pscore">${p.score}</div>
      <div class="pmeta">${WIN - p.score > 0 ? (WIN-p.score)+' to go' : 'Game!'}${p._lastAdd ? ` · <span class="lastadd">${p._lastAdd>0?'+':''}${p._lastAdd} last play</span>` : ''}</div>
      <div class="track"><div class="track-fill" style="width:${pct}%"></div></div>
      <div class="skunkmarks">
        <span style="left:${dblPct}%">61</span>
        <span style="left:${skunkPct}%">91</span>
      </div>
      <div class="stamps" data-idx="${idx}"></div>
      <div class="pending-row">
        <button class="signbtn" data-idx="${idx}">−</button>
        <div class="pending" data-idx="${idx}">0</div>
      </div>
      <div class="smallbtns">
        <button class="btn clear-btn" data-action="clear" data-idx="${idx}">Clear</button>
        <button class="btn submit-btn" data-action="submit" data-idx="${idx}">Submit</button>
      </div>
    </div>`);

    const stampsWrap = card.querySelector('.stamps');
    [1,2,3,4,7,12].forEach(v=>{
      const b = el(`<div class="stamp">${v}</div>`);
      b.onclick = ()=> addStamp(idx, v);
      stampsWrap.appendChild(b);
    });

    const signBtn = card.querySelector('.signbtn');
    if(p._sign === -1) signBtn.classList.add('active');
    signBtn.onclick = ()=>{
      p._sign = (p._sign === -1) ? 1 : -1;
      render();
    };

    card.querySelector('[data-action=clear]').onclick = ()=>{
      p._pending = 0; p._sign = 1;
      render();
    };
    card.querySelector('[data-action=submit]').onclick = ()=> submitPending(idx);

    app.appendChild(card);
  });

  // update pending displays after building (need to read p._pending after init)
  state.players.forEach((p, idx)=>{
    if(p._pending == null) p._pending = 0;
    if(p._sign == null) p._sign = 1;
  });
  // re-render pending values into DOM (simplify by re-querying)
  document.querySelectorAll('.pending').forEach(div=>{
    const idx = +div.dataset.idx;
    const p = state.players[idx];
    const val = (p._sign===-1 ? -1 : 1) * (p._pending||0);
    div.textContent = (val>0?'+':'') + val;
    div.classList.toggle('neg', val<0);
  });
}

function addStamp(idx, v){
  const p = state.players[idx];
  p._pending = (p._pending||0) + v;
  render();
}

function submitPending(idx){
  const p = state.players[idx];
  const pending = p._pending || 0;
  if(pending === 0) return;
  const delta = (p._sign===-1 ? -1 : 1) * pending;
  p.score = Math.max(0, p.score + delta);
  p._lastAdd = delta;
  p._pending = 0; p._sign = 1;

  // skunk line crossing notice (informational toast), only on increases
  if(delta > 0){
    if(p.score >= WIN){
      p.score = WIN;
      finishGame();
      return;
    } else if(p.score >= SKUNK && (p.score - delta) < SKUNK){
      state.toast = `${p.name} crossed the skunk line (91)!`;
    }
  }
  render();
}

async function finishGame(){
  state.finished = true;
  const winner = state.players.reduce((a,b)=> a.score>=b.score?a:b);

  // update in-memory leaderboard/history (no get call here — storage is only
  // read back after we've successfully written at least once)
  state.players.forEach(p=>{
    if(!leaderboard[p.name]) leaderboard[p.name] = { wins:0, points:0, games:0 };
    leaderboard[p.name].points += p.score;
    leaderboard[p.name].games += 1;
    if(p === winner) leaderboard[p.name].wins += 1;
  });

  history.unshift({
    date: new Date().toISOString(),
    players: state.players.map(p=>{
      let skunk = 'none';
      if(p !== winner){
        if(p.score < DBL_SKUNK) skunk = 'double';
        else if(p.score < SKUNK) skunk = 'single';
      }
      return { name:p.name, score:p.score, skunk };
    }),
    winner: winner.name
  });

  const saved = await saveData();
  if(saved){
    // confirm/sync with what's actually stored now that a write has happened
    await loadData();
  }

  render();
}

// ---------- LEADERBOARD ----------
function renderLeaderboard(app){
  renderLeaderboardContent(app);
}
function renderLeaderboardContent(app){
    const notice = el(`<div class="card" style="padding:12px 16px;font-size:0.8em;color:var(--muted);">
      ℹ️ Leaderboard and game history are kept for this session only — they reset if you reload or close the app.
    </div>`);
    app.appendChild(notice);
    const names = Object.keys(leaderboard).sort((a,b)=> leaderboard[b].wins - leaderboard[a].wins || leaderboard[b].points - leaderboard[a].points);
    const card = el(`<div class="card"><h2 style="margin-top:0;color:var(--accent);font-size:1.1em;">🏆 Leaderboard</h2></div>`);
    if(names.length === 0){
      card.appendChild(el(`<div class="empty">No games finished yet. Play a game to populate the leaderboard!</div>`));
    } else {
      const tbl = el(`<table><thead><tr><th>Player</th><th>Wins</th><th>Games</th><th>Total Pts</th></tr></thead><tbody></tbody></table>`);
      const tbody = tbl.querySelector('tbody');
      names.forEach(n=>{
        const s = leaderboard[n] || {};
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(String(n))}</td>
          <td class="num">${s.wins || 0}</td>
          <td class="num">${s.games || 0}</td>
          <td class="num">${s.points || 0}</td>
        `;
        tbody.appendChild(tr);
      });
      card.appendChild(tbl);
    }
    app.appendChild(card);

    const hcard = el(`<div class="card"><h2 style="margin-top:0;color:var(--accent);font-size:1.1em;">Recent Games</h2></div>`);
    if(history.length === 0){
      hcard.appendChild(el(`<div class="empty">No games played yet.</div>`));
    } else {
      history.forEach((g, gi)=>{
        if(!g || !Array.isArray(g.players)) return;
        const d = g.date ? new Date(g.date) : new Date();
        const skunkedNames = g.players.filter(p=>p.skunk==='double' || p.skunk==='single');
        const skunkSuffix = skunkedNames.length ? ' · 🦨 skunk' : '';
        const entry = el(`<div class="game-entry">
          <div class="game-summary">
            <div class="left">
              <span class="winner">${escapeHtml(String(g.winner || '—'))}</span> won${skunkSuffix}
              <div class="date">${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
            </div>
            <span class="caret">▼</span>
          </div>
          <div class="game-detail"></div>
        </div>`);
        const detail = entry.querySelector('.game-detail');
        g.players.slice().sort((a,b)=>(b.score||0)-(a.score||0)).forEach(p=>{
          detail.appendChild(el(`<div class="grow"><span>${escapeHtml(String(p.name || '—'))}</span><b>${p.score || 0}</b></div>`));
        });
        skunkedNames.forEach(p=>{
          const label = p.skunk === 'double' ? `${p.name} got double skunked! 🦨🦨` : `${p.name} got skunked! 🦨`;
          detail.appendChild(el(`<div class="skunktxt">${escapeHtml(label)}</div>`));
        });

        const summary = entry.querySelector('.game-summary');
        const caret = entry.querySelector('.caret');
        summary.onclick = ()=>{
          detail.classList.toggle('open');
          caret.classList.toggle('open');
        };
        hcard.appendChild(entry);
      });
    }
    const resetBtn = el(`<button class="btn reset-btn" style="width:100%;margin-top:14px;">Reset Leaderboard &amp; History</button>`);
    resetBtn.onclick = async ()=>{
      if(confirm('This will permanently erase the leaderboard and all game history. Continue?')){
        leaderboard = {};
        history = [];
        await saveData();
        render();
      }
    };
    hcard.appendChild(resetBtn);
    app.appendChild(hcard);
}

// init — no storage call here; we only touch storage after the first game is saved
render();
</script>
</body>
</html>
